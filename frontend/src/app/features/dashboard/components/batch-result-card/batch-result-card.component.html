<div class="batch-result-card">
  <p class="font-semibold mb-2">Variación #{{ index() + 1 }}</p>
  @switch (result().status) {
    @case ('loading') {
      <div class="spinner spinner--sm"></div>
    }
    @case ('error') {
      <p class="text-sm" style="color: var(--color-accent-red);">Error: {{ result().errorMsg }}</p>
    }
    @case ('done') {
      <div class="flex flex-col gap-2">
        @if (result().referenceBase64) {
          <img
            [src]="result().referenceBase64"
            alt="Referencia"
            class="thumbnail cursor-pointer"
            (click)="openFullscreen.emit(result().referenceBase64!)"
          />
        }
        @if (result().analysis) {
          <div>
            <div class="flex justify-between items-center mb-1">
              <span class="text-xs" style="color: var(--text-secondary);">Análisis de Variación:</span>
              <button class="glass-button" (click)="copyJson.emit(result().analysis!)">
                📋 Copiar JSON
              </button>
            </div>
            <pre class="json-block">{{ result().analysis | json }}</pre>
          </div>
        }
      </div>
    }
  }
</div>
